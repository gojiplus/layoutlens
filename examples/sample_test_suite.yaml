name: "Sample Website Test Suite"
description: "Example test suite showing the required expected_results schema"

test_cases:
  - name: "Navigation Alignment Desktop"
    html_path: "benchmarks/test_data/layout_alignment/nav_centered.html"
    queries:
      - "Is the navigation menu properly centered?"
    viewports: ["desktop"]
    expected_results:
      answer: "yes"
      contains: ["centered"]
    expected_confidence: 0.7
    metadata:
      priority: "high"
      test_type: "layout_alignment"

  - name: "Well-Designed Form"
    html_path: "benchmarks/test_data/ui_components/form_well_designed.html"
    queries:
      - "Are all form fields properly labeled?"
    viewports: ["desktop", "tablet_portrait"]
    expected_results:
      answer: "yes"
    expected_confidence: 0.7
    metadata:
      priority: "high"
      test_type: "ui_components"

  - name: "Accessibility Compliance"
    html_path: "benchmarks/test_data/accessibility/wcag_compliant.html"
    queries:
      - "Does the page meet accessibility standards?"
    viewports: ["desktop", "mobile_portrait"]
    expected_results:
      answer: "yes"
      contains: ["contrast"]
    expected_confidence: 0.7
    metadata:
      priority: "high"
      test_type: "accessibility"

  - name: "Responsive Design Test"
    html_path: "benchmarks/test_data/responsive_design/mobile_friendly.html"
    queries:
      - "Does the layout adapt to different screen sizes?"
    viewports: ["mobile_portrait", "desktop"]
    expected_results:
      answer: "yes"
    expected_confidence: 0.7
    metadata:
      priority: "medium"
      test_type: "responsive_design"

metadata:
  version: "1.7.0"
  created_by: "LayoutLens"
  notes: >
    expected_results is required per case: declare "answer" ("yes"/"no",
    matched against the leading yes/no token of the analysis answer) and/or
    "contains" (terms that must appear, case-insensitively, in the answer +
    reasoning). expected_confidence (default 0.7) is an additional minimum-
    confidence gate.
